<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoneytrapAI — Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f0f1a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:12px;padding:2.5rem 2rem;
          width:100%;max-width:360px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
    .logo{margin-bottom:1.2rem}
    .logo img{width:72px;height:72px;border-radius:12px}
    h1{font-size:1.5rem;color:#f5a623;margin-bottom:.3rem}
    .tagline{font-size:.8rem;color:#888;margin-bottom:1.8rem;letter-spacing:.05em}
    .threat-preview{background:#12122a;border:1px solid #2a2a4a;border-radius:8px;
                    padding:.7rem 1rem;margin-bottom:1.5rem;font-size:.78rem;color:#aaa;text-align:left}
    .threat-preview .dot{display:inline-block;width:8px;height:8px;border-radius:50%;
                         background:#27ae60;margin-right:.4rem;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    label{display:block;text-align:left;font-size:.82rem;color:#aaa;margin-bottom:.4rem}
    input[type=password]{width:100%;background:#12122a;border:1px solid #2a2a4a;border-radius:6px;
                         padding:.65rem .9rem;color:#e0e0e0;font-size:.95rem;outline:none;
                         transition:border .2s}
    input[type=password]:focus{border-color:#f5a623}
    .error{background:#2a1010;border:1px solid #c0392b;border-radius:6px;
           color:#e74c3c;font-size:.82rem;padding:.5rem .8rem;margin-bottom:1rem;text-align:left}
    button{width:100%;background:#f5a623;color:#1a1a2e;border:none;border-radius:6px;
           padding:.75rem;font-size:1rem;font-weight:700;cursor:pointer;margin-top:1rem;
           transition:background .2s}
    button:hover{background:#e09400}
    .footer{margin-top:1.8rem;font-size:.72rem;color:#555;line-height:1.6}
    .footer a{color:#888;text-decoration:none}
    .footer a:hover{color:#f5a623}
    .version{font-size:.68rem;color:#444;margin-top:.5rem}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='hg' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23f5a623'/%3E%3Cstop offset='100%25' stop-color='%23e09400'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='50,4 93,27 93,73 50,96 7,73 7,27' fill='%231a1a2e' stroke='url(%23hg)' stroke-width='4'/%3E%3Cpath d='M50 30 L50 70 M35 40 L65 40 M35 60 L65 60' stroke='%23f5a623' stroke-width='3' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='50' r='14' fill='none' stroke='%23f5a623' stroke-width='3'/%3E%3Ccircle cx='50' cy='50' r='5' fill='%23f5a623'/%3E%3Ccircle cx='62' cy='26' r='6' fill='%23f5a623'/%3E%3Cline x1='58' y1='24' x2='55' y2='22' stroke='%231a1a2e' stroke-width='1.5'/%3E%3Cline x1='60' y1='21' x2='58' y2='18' stroke='%231a1a2e' stroke-width='1.5'/%3E%3C/svg%3E"
         alt="HoneytrapAI">
  </div>
  <h1>HoneytrapAI</h1>
  <div class="tagline">NO CLOUD &nbsp;·&nbsp; NO SUBSCRIPTION &nbsp;·&nbsp; OPEN SOURCE</div>

  <div class="threat-preview">
    <span class="dot"></span>Protecting your network
  </div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <label for="password">Dashboard Password</label>
    <input type="password" id="password" name="password" autofocus autocomplete="current-password" placeholder="Enter password">
    <button type="submit">Sign In</button>
  </form>

  <div class="footer">
    No cloud. No subscription. No monthly fees. Ever.<br>
    <a href="https://honeytrap.ai/community">🐝 Join the Pro Club</a>
  </div>
  <div class="version">{{ version }}</div>
</div>
</body>
</html>
